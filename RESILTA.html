    // ========== دوال البحث الذكي ==========
    // إزالة التشكيل والهمزات والألف المقصورة وغيرها
    function normalizeText(str) {
        return str.normalize("NFD").replace(/[\u064B-\u065F\u0670]/g, "").replace(/[آأإٱ]/g, "ا").replace(/[ة]/g, "ه").replace(/[ى]/g, "ي").toLowerCase();
    }

    // حساب مسافة ليفنشتاين للتشابه (بسيطة)
    function levenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                const cost = a[j-1] === b[i-1] ? 0 : 1;
                matrix[i][j] = Math.min(
                    matrix[i-1][j] + 1,
                    matrix[i][j-1] + 1,
                    matrix[i-1][j-1] + cost
                );
            }
        }
        return matrix[b.length][a.length];
    }

    // درجة التشابه (كلما زادت كان أفضل)
    function similarityScore(normQuery, normText) {
        if (normText.includes(normQuery)) return 100;
        const wordsQuery = normQuery.split(/\s+/);
        const wordsText = normText.split(/\s+/);
        let matchCount = 0;
        for (let wq of wordsQuery) {
            for (let wt of wordsText) {
                if (wt.includes(wq) || wq.includes(wt) || levenshteinDistance(wq, wt) <= 2) {
                    matchCount++;
                    break;
                }
            }
        }
        const ratio = matchCount / wordsQuery.length;
        if (ratio >= 0.7) return 80 + ratio*10;
        // levenshtein على النص الكامل
        const maxLen = Math.max(normQuery.length, normText.length);
        const dist = levenshteinDistance(normQuery, normText);
        const sim = (1 - dist / maxLen) * 100;
        return sim;
    }

            const normFull = normalizeText(student.fullName);
            const normLast = normalizeText(student.lastName);
            const normFirst = normalizeText(student.firstName);
            let score = Math.max(
                similarityScore(normQuery, normFull),
                similarityScore(normQuery, normLast),
                similarityScore(normQuery, normFirst)
            );
            // Bonus if query matches full name exactly (normalized)
            if (normFull === normQuery) score = 100;
            else if (normFull.includes(normQuery) || normQuery.includes(normFull)) score = Math.max(score, 95);
            if (score > bestScore) {
                bestScore = score;
                bestMatch = student;
            }
        }
        // عتبة القبول 40%
        if (bestScore >= 40) return bestMatch;
        return null;
    }

    // عرض النتيجة والتهنئة
    function displayResult(student, queryUsed = "") {
        const resultDiv = document.getElementById("resultArea");
        if (!student) {
            resultDiv.innerHTML = `
                <div class="result-card" style="background:#ffe6e6; border-right-color:#d32f2f;">
                    <div style="color:#b71c1c; text-align:center; font-size:1.2rem;">
                        ❌ لم يتم العثور على طالب مطابق للبحث: "${queryUsed}"<br>
                        تأكد من الاسم أو رقم التسجيل (دورة 2026)
                    </div>
                </div>
            `;
            return;
        }
        const typeText = (student.type === "certificate") ? "🎓 ناجح بالشهادة" : "📚 ناجح بمعدل التقويم المستمر";
        const badgeColor = (student.type === "certificate") ? "#1e88e5" : "#2e7d32";
        let extraInfo = "";
        if (student.type === "eval") {
            extraInfo = `<div class="info-row"><span class="label">📘 معدل الشهادة:</span><span class="value">${student.certExam?.toFixed(2) ?? "—"}</span></div>
                         <div class="info-row"><span class="label">📈 المعدل السنوي:</span><span class="value">${student.annualAvg?.toFixed(2) ?? "—"}</span></div>`;
        }
        const congratsMsg = (student.type === "certificate") 
            ? `🎉 مبارك النجاح في شهادة التعليم المتوسط 🎉<br> أنتَ/أنتِ من المتفوقين، فخر للمتوسطة.`
            : `🌟 تهانينا! نجحت بمعدل التقويم المستمر، وسيتم قبولك في السنة الأولى ثانوي 🌟<br> جهدك المتميز أتى ثماره.`;

        resultDiv.innerHTML = `
            <div class="result-card">
                <div class="info-row">
                    <span class="label">📌 رقم التسجيل:</span>
                    <span class="value">${student.regNum}</span>
                </div>
                <div class="info-row">
                    <span class="label">👤 الاسم الكامل:</span>
                    <span class="value">${student.fullName}</span>
                </div>
                <div class="info-row">
                    <span class="label">📅 تاريخ الميلاد:</span>
                    <span class="value">${student.birth}</span>
                </div>
                <div class="info-row">
                    <span class="label">⭐ المعدل / درجة القبول:</span>
                    <span class="value"><strong style="color:${badgeColor}">${student.score.toFixed(2)}</strong></span>
                </div>
                <div class="info-row">
                    <span class="label">📝 الملاحظة:</span>
                    <span class="value">${student.note}</span>
                </div>
                <div class="info-row">
                    <span class="label">🏆 نوع النجاح:</span>
                    <span class="value" style="background:${badgeColor}20; padding:4px 12px; border-radius:30px;">${typeText}</span>
                </div>
                ${extraInfo}
                <div class="congrats">
                    ${congratsMsg}
                </div>
                <div class="note-success">
                    ✅ متوسطة الشهيد بوضريسة محمد الأمين تفتخر بنجاحك.
                </div>
            </div>
        `;
    }

    // ملء datalist بالاقتراحات (جميع الأسماء الكاملة)
    function fillDatalist() {
        const datalist = document.getElementById("studentNames");
        datalist.innerHTML = "";
        const namesSet = new Set();
        students.forEach(s => {
            if (!namesSet.has(s.fullName)) {
                namesSet.add(s.fullName);
                const option = document.createElement("option");
                option.value = s.fullName;
                datalist.appendChild(option);
            }
        });
    }

    // حدث البحث
    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");

    function performSearch() {
        const query = searchInput.value;
        const best = smartSearch(query);
        displayResult(best, query);
    }

    searchBtn.addEventListener("click", performSearch);
    searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") performSearch();
    });

    fillDatalist();
    console.log(`تم تحميل ${students.length} طالب (${certificateData.length} بالشهادة + ${evalData.length} بالتقويم)`);
</script>
